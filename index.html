<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#101315" />
  <meta name="description" content="An adaptive, offline-first Polish coach with a Listening Lab, Polish Sound Lab, tap-to-explain morphology, skill-specific memory, and real family conversations." />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Blisko — Polish for family</title>
  <link rel="manifest" href="./manifest.webmanifest?v=1.8" />
  <link rel="icon" href="./icon.svg?v=1.8" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./icon-192.png?v=1.8" />
  <link rel="stylesheet" href="./styles.css?v=1.8" />
</head>
<body>
  <div class="ambient ambient-one"></div>
  <div class="ambient ambient-two"></div>

  <div id="app" class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <a class="brand" href="#dashboard" aria-label="Blisko home">
        <span class="brand-mark" aria-hidden="true"><span>B</span></span>
        <span class="brand-copy">
          <strong>blisko</strong>
          <small>Polish for family</small>
        </span>
      </a>

      <nav id="desktop-nav" class="nav-list"></nav>

      <div class="sidebar-spacer"></div>

      <section class="daily-mini-card" aria-label="Daily learning goal">
        <div class="mini-card-top">
          <span>Today</span>
          <strong id="sidebar-goal-label">0 / 15 min</strong>
        </div>
        <div class="mini-progress"><span id="sidebar-goal-bar" style="width:0%"></span></div>
        <p id="sidebar-nudge">One useful sentence is enough to keep momentum.</p>
      </section>

      <button class="profile-button" id="profile-button" type="button" aria-label="Open settings">
        <span class="profile-avatar">K</span>
        <span class="profile-copy">
          <strong>Kars</strong>
          <small id="profile-level">Starting Polish</small>
        </span>
        <span class="profile-chevron" aria-hidden="true">›</span>
      </button>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <div class="topbar-title-wrap">
          <button class="mobile-logo" id="mobile-logo" type="button" aria-label="Go to dashboard">
            <span class="brand-mark small"><span>B</span></span>
          </button>
          <div>
            <p class="eyebrow" id="page-eyebrow">YOUR COACH</p>
            <h1 id="page-title">Today</h1>
          </div>
        </div>

        <div class="topbar-actions">
          <div class="status-pill" id="connection-pill" title="The core app works without an internet connection">
            <span class="status-dot"></span>
            <span id="connection-label">Offline ready</span>
          </div>
          <button class="icon-button install-hidden" id="install-button" type="button" aria-label="Install app" title="Install app">
            <span data-icon="download"></span>
          </button>
          <button class="streak-button" id="streak-button" type="button" aria-label="Study streak">
            <span class="streak-flame">◒</span>
            <strong id="streak-count">0</strong>
          </button>
          <button class="language-flag-button" id="language-button" type="button" data-action="toggle-language" aria-label="Switch explanations to English" title="Switch explanations to English">
            <span class="language-flag" id="language-flag" aria-hidden="true">🇳🇱</span>
            <strong id="language-code">NL</strong>
          </button>
          <button class="icon-button mobile-settings-button" type="button" data-action="open-settings" aria-label="Open coach settings" title="Coach settings">
            <span data-icon="settings"></span>
          </button>
          <button class="icon-button" id="theme-button" type="button" aria-label="Toggle color theme" title="Toggle theme">
            <span id="theme-icon" data-icon="sun"></span>
          </button>
        </div>
      </header>

      <main id="main-content" class="main-content" tabindex="-1"></main>
    </div>

    <nav id="mobile-nav" class="mobile-nav" aria-label="Mobile navigation"></nav>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root" class="toast-root" aria-live="polite" aria-atomic="true"></div>

  <noscript>
    <div class="noscript-card">Blisko needs JavaScript to run. All learning data stays on this device by default.</div>
  </noscript>

  <script>
    (() => {
      const BUILD = '1.8';
      const cleanText = (value) => String(value || '').replace(/[<>&"']/g, '').slice(0, 240);
      const showStartupRepair = (detail = '') => {
        if (document.documentElement.dataset.bliskoReady === 'true') return;
        const main = document.getElementById('main-content');
        if (!main || main.childElementCount > 0) return;
        main.innerHTML = `
          <section class="card startup-repair-card" role="alert">
            <p class="eyebrow">APP REPAIR</p>
            <h2>Blisko could not finish loading</h2>
            <p>The app files are out of sync or an older offline cache is still active. Your learning progress is safe.</p>
            ${detail ? `<p class="startup-error-detail">${cleanText(detail)}</p>` : ''}
            <button class="primary-button" id="repair-app-cache" type="button">Repair app cache</button>
            <p class="micro-copy">This refreshes only Blisko's app files. It does not delete vocabulary progress, reviews, streaks, or tutor history.</p>
          </section>`;
        document.getElementById('repair-app-cache')?.addEventListener('click', async () => {
          const button = document.getElementById('repair-app-cache');
          if (button) { button.disabled = true; button.textContent = 'Repairing…'; }
          try {
            const registrations = await navigator.serviceWorker?.getRegistrations?.() || [];
            const currentUrl = location.href;
            const relevantRegistrations = registrations.filter((registration) => currentUrl.startsWith(registration.scope));
            await Promise.all(relevantRegistrations.map((registration) => registration.unregister()));
            if ('caches' in window) {
              const keys = await caches.keys();
              const scope = new URL('./', location.href).href;
              const scopePath = new URL(scope).pathname;
              const scopeKey = scopePath.replace(/^\/+|\/+$/g, '').replace(/[^a-z0-9_-]+/gi, '-').toLowerCase() || 'root';
              const prefix = `blisko-${scopeKey}-`;
              await Promise.all(keys.map(async (key) => {
                if (key.startsWith(prefix)) {
                  await caches.delete(key);
                  return;
                }
                if (/^blisko-(?:shell-flat|runtime)-v/i.test(key)) {
                  const cache = await caches.open(key);
                  const requests = await cache.keys();
                  await Promise.all(requests.filter((request) => request.url.startsWith(scope)).map((request) => cache.delete(request)));
                  if (!(await cache.keys()).length) await caches.delete(key);
                }
              }));
            }
          } finally {
            const clean = new URL(location.href);
            clean.searchParams.set('repair', BUILD);
            location.replace(clean.toString());
          }
        });
      };
      window.addEventListener('error', (event) => setTimeout(() => showStartupRepair(event.message), 0));
      window.addEventListener('unhandledrejection', (event) => setTimeout(() => showStartupRepair(event.reason?.message || ''), 0));
      setTimeout(() => showStartupRepair(), 3500);
    })();
  </script>

  <script type="module" src="./app.js?v=1.8"></script>
</body>
</html>
